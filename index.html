<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Le Journal</title>

  <style>
    body { font-family: Arial; margin:0; background:#0e0e12; color:#eee; }
    header { padding:12px; background:#18181f; display:flex; justify-content:space-between; }
    .btn { cursor:pointer; padding:6px 10px; border:1px solid #444; background:#222; color:#fff; }

    .container { max-width:900px; margin:auto; padding:20px; }

    .article { background:#18181f; padding:15px; margin-bottom:15px; border-radius:10px; }

    .title { font-size:20px; font-weight:bold; margin-bottom:10px; }

    .article-body p { margin:0 0 10px 0; line-height:1.6; }

    #admin-panel { display:none; margin-bottom:20px; }
    textarea, input { width:100%; margin-bottom:10px; padding:8px; }

    #login-box { display:none; position:fixed; top:20%; left:50%; transform:translateX(-50%);
      background:#222; padding:20px; border-radius:10px; }
  </style>
</head>

<body>

<header>
  <div>📰 Le Journal</div>
  <div>
    <button class="btn" onclick="openLogin()">Connexion</button>
    <button class="btn" onclick="logout()">Logout</button>
  </div>
</header>

<div class="container">

  <!-- ADMIN -->
  <div id="admin-panel">
    <h3>Publier un article</h3>
    <input id="title" placeholder="Titre"/>
    <textarea id="body" placeholder="Contenu (double saut = paragraphe)"></textarea>
    <button class="btn" onclick="publish()">Publier</button>
  </div>

  <!-- LIST -->
  <div id="list">Chargement...</div>

</div>

<!-- LOGIN -->
<div id="login-box">
  <h3>Login admin</h3>
  <input id="email" placeholder="email"/>
  <input id="password" type="password" placeholder="password"/>
  <button class="btn" onclick="login()">Se connecter</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import { getFirestore, collection, addDoc, getDocs, query, orderBy, serverTimestamp }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* 🔥 TA CONFIG FIREBASE ICI */
const firebaseConfig = {
  apiKey: "XXX",
  authDomain: "XXX",
  projectId: "XXX"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const ADMIN_EMAIL = "admin@test.com";

let isAdmin = false;
let articles = [];

/* ===== AUTH ===== */
onAuthStateChanged(auth, user => {
  isAdmin = user && user.email === ADMIN_EMAIL;

  document.getElementById("admin-panel").style.display = isAdmin ? "block" : "none";
  load();
});

/* ===== LOGIN ===== */
window.login = async () => {
  const email = document.getElementById("email").value;
  const pwd = document.getElementById("password").value;

  await signInWithEmailAndPassword(auth, email, pwd);
  document.getElementById("login-box").style.display = "none";
};

window.logout = () => signOut(auth);

/* ===== OPEN LOGIN ===== */
window.openLogin = () => {
  document.getElementById("login-box").style.display = "block";
};

/* ===== PUBLISH ===== */
window.publish = async () => {
  const title = document.getElementById("title").value;
  const body = document.getElementById("body").value;

  await addDoc(collection(db, "articles"), {
    title,
    body,
    createdAt: serverTimestamp()
  });

  document.getElementById("title").value = "";
  document.getElementById("body").value = "";

  load();
};

/* ===== LOAD ===== */
async function load() {
  const q = query(collection(db, "articles"), orderBy("createdAt", "desc"));
  const snap = await getDocs(q);

  articles = snap.docs.map(d => ({ id: d.id, ...d.data() }));

  render();
}

/* ===== PARAGRAPHS FIX ===== */
function formatBody(text) {
  return (text || "")
    .replace(/\r\n/g, "\n")
    .split(/\n{2,}/)   // ✔ double saut = paragraphe
    .map(p => `<p>${escapeHtml(p)}</p>`)
    .join("");
}

function escapeHtml(s) {
  return (s || "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}

/* ===== RENDER ===== */
function render() {
  const el = document.getElementById("list");

  if (!articles.length) {
    el.innerHTML = "Aucun article";
    return;
  }

  el.innerHTML = "";

  articles.forEach(a => {
    const div = document.createElement("div");
    div.className = "article";

    div.innerHTML = `
      <div class="title">${escapeHtml(a.title)}</div>
      <div class="article-body">${formatBody(a.body)}</div>
    `;

    el.appendChild(div);
  });
}

</script>

</body>
</html>

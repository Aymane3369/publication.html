<!DOCTYPE html>
<html lang="fr" data-theme="dark">

<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="referrer" content="strict-origin-when-cross-origin"/>
  <title>Le Journal</title>

<style>
/* ===== TON CSS INCHANGÉ ===== */
</style>

</head>

<body>

<header>
  <a class="brand" href="#"><span class="brand-dot"></span>Le Journal</a>
</header>

<section class="hero">
  <input type="text" id="search-input" placeholder="Rechercher..." oninput="onSearch()"/>
</section>

<div class="page">

<main>
  <div id="articles-list"><div id="empty-main">Chargement…</div></div>
</main>

<aside>
  <ul id="index-list"></ul>
</aside>

</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  getFirestore, collection, addDoc, getDocs, deleteDoc,
  doc, updateDoc, query, orderBy, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const ADMIN_EMAIL = "aymaneabidine@gmail.com";

const firebaseConfig = {
  apiKey: "AIzaSyDs5vSuJ4XfYDhmUleWcOHaFEhikfp2G4M",
  authDomain: "publication-54ffa.firebaseapp.com",
  projectId: "publication-54ffa",
  storageBucket: "publication-54ffa.firebasestorage.app",
  messagingSenderId: "586923416251",
  appId: "1:586923416251:web:4fece200ce95341d8ba79e"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let allArticles = [];
let isAdmin = false;
let editingId = null;

/* ================= LOAD ================= */
async function loadArticles() {
  const listEl = document.getElementById("articles-list");
  listEl.innerHTML = "<div style='text-align:center'>Chargement…</div>";

  try {
    const snap = await getDocs(
      query(collection(db, "articles"), orderBy("createdAt", "desc"))
    );

    allArticles = [];
    snap.forEach(d => allArticles.push({ id: d.id, ...d.data() }));

    renderArticles(allArticles);
    renderIndex(allArticles);

  } catch (e) {
    listEl.innerHTML = `<div style="color:red;padding:1rem">Erreur : ${e.message}</div>`;
  }
}

/* ================= RENDER ARTICLES ================= */
function renderArticles(list) {
  const listEl = document.getElementById("articles-list");
  const labelEl = document.getElementById("articles-label");

  const q = document.getElementById("search-input").value.trim().toLowerCase();

  if (!list.length) {
    listEl.innerHTML = "<div>Aucun article</div>";
    return;
  }

  listEl.innerHTML = "";

  list.forEach(d => {

    const date = d.createdAt
      ? new Date(d.createdAt.seconds * 1000)
          .toLocaleDateString("fr-FR",{day:'numeric',month:'long',year:'numeric'})
      : "—";

    const card = document.createElement("div");
    card.className = "article-card";

    card.innerHTML = `
      <div class="article-content">
        <div class="article-meta">
          <span class="article-date">📅 ${date}</span>
          <span class="tag">Article</span>
        </div>

        <div class="article-title">${esc(d.title)}</div>

        <div class="article-body" id="body-${d.id}">
          ${esc(d.body)}
        </div>

        <button class="read-more" onclick="toggleBody('${d.id}')">
          Lire la suite →
        </button>
      </div>
    `;

    listEl.appendChild(card);
  });
}

/* ================= INDEX ================= */
function renderIndex(list) {
  const ul = document.getElementById("index-list");

  if (!list.length) {
    ul.innerHTML = '<li class="no-results">Aucun article</li>';
    return;
  }

  ul.innerHTML = "";

  list.forEach((d, i) => {

    const date = d.createdAt
      ? new Date(d.createdAt.seconds * 1000)
          .toLocaleDateString("fr-FR",{day:'numeric',month:'short'})
      : "";

    const li = document.createElement("li");
    li.className = "index-item";

    li.innerHTML = `
      <span class="index-num">${i+1}</span>
      <div>
        <div class="index-title">${esc(d.title)}</div>
        <div class="index-date">${date}</div>
      </div>
    `;

    ul.appendChild(li);
  });
}

/* ================= SEARCH ================= */
window.onSearch = () => {
  const q = document.getElementById("search-input").value.toLowerCase();

  const filtered = q
    ? allArticles.filter(a =>
        a.title.toLowerCase().includes(q) ||
        a.body.toLowerCase().includes(q)
      )
    : allArticles;

  renderArticles(filtered);
  renderIndex(filtered);
};

/* ================= READ MORE ================= */
window.toggleBody = (id) => {
  const el = document.getElementById("body-" + id);
  el.classList.toggle("expanded");
};

/* ================= HELPERS FIXÉS ================= */
function esc(s) {
  return (s || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;");
}

/* ================= START ================= */
loadArticles();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="referrer" content="strict-origin-when-cross-origin"/>
<title>Le Journal</title>

<style>
/* ====== TON CSS INCHANGÉ ====== */
/* (je le laisse identique pour éviter de casser ton design) */

@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ... GARDER TON CSS EXACT ... */
body { font-family:'Inter',sans-serif; background:#0e0e12; color:#eeeef5; }
</style>
</head>

<body>

<header>
  <a class="brand" href="#">Le Journal</a>
  <div>
    <button onclick="toggleTheme()">🌙</button>
    <button onclick="openLogin()">Connexion Admin</button>
  </div>
</header>

<section class="hero">
  <h1>Actualités & Articles</h1>
  <input id="search-input" placeholder="Rechercher..." oninput="onSearch()"/>
</section>

<div id="modal-overlay">
  <div>
    <input id="email" placeholder="email"/>
    <input id="password" type="password" placeholder="mdp"/>
    <button onclick="login()">Login</button>
  </div>
</div>

<main>
  <div id="admin-panel" style="display:none;">
    <input id="art-title" placeholder="titre"/>
    <textarea id="art-body"></textarea>
    <input id="art-image" placeholder="image url"/>
    <input id="art-video" placeholder="youtube url"/>
    <button onclick="publishArticle()">Publier</button>
  </div>

  <div id="articles-list"></div>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const ADMIN_EMAIL = "aymaneabidine@gmail.com";

const firebaseConfig = {
  apiKey: "AIza...",
  authDomain: "publication-54ffa.firebaseapp.com",
  projectId: "publication-54ffa",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let isAdmin = false;
let editingId = null;
let allArticles = [];

/* ================= AUTH ================= */
onAuthStateChanged(auth, user => {
  isAdmin = user?.email === ADMIN_EMAIL;
  document.getElementById('admin-panel').style.display = isAdmin ? 'block' : 'none';
  loadArticles();
});

window.login = async () => {
  const email = email.value;
  const password = password.value;

  if (email !== ADMIN_EMAIL) return alert("Non autorisé");

  await signInWithEmailAndPassword(auth, email, password);
};

window.logout = () => signOut(auth);

/* ================= CRUD ================= */
window.publishArticle = async () => {
  const title = art_title.value.trim();
  const body = art_body.value.trim();

  if (!title || !body) return alert("Titre + contenu obligatoires");

  await addDoc(collection(db, "articles"), {
    title,
    body,
    image: art_image.value || null,
    video: art_video.value || null,
    createdAt: serverTimestamp()
  });

  resetForm();
  loadArticles();
};

function resetForm() {
  art_title.value = "";
  art_body.value = "";
  art_image.value = "";
  art_video.value = "";
}

/* ================= LOAD ================= */
async function loadArticles() {
  const snap = await getDocs(query(collection(db,"articles"), orderBy("createdAt","desc")));

  allArticles = snap.docs.map(d => ({ id:d.id, ...d.data() }));
  render(allArticles);
}

/* ================= RENDER ================= */
function render(list) {
  const el = document.getElementById("articles-list");
  el.innerHTML = "";

  list.forEach(a => {
    const div = document.createElement("div");

    const yt = getYT(a.video);

    let media = "";

    if (a.image) {
      media += `
        <img src="${escapeHtml(a.image)}"
          onerror="this.style.display='none'; this.insertAdjacentHTML('afterend',
          '<div style=&quot;padding:10px;color:#999&quot;>Image indisponible</div>')"
          style="width:100%;height:220px;object-fit:cover;">
      `;
    }

    if (yt) {
      media += `
        <iframe width="100%" height="250"
          src="https://www.youtube-nocookie.com/embed/${yt}"
          frameborder="0" allowfullscreen></iframe>
      `;
    }

    div.innerHTML = `
      ${media}
      <h2>${escapeHtml(a.title)}</h2>
      <p>${escapeHtml(a.body)}</p>

      ${isAdmin ? `
        <button onclick="deleteArticle('${a.id}')">🗑</button>
      ` : ""}
    `;

    el.appendChild(div);
  });
}

/* ================= DELETE ================= */
window.deleteArticle = async (id) => {
  if (!confirm("Supprimer ?")) return;
  await deleteDoc(doc(db,"articles",id));
  loadArticles();
};

/* ================= SEARCH ================= */
window.onSearch = () => {
  const q = search_input.value.toLowerCase();
  render(allArticles.filter(a =>
    a.title.toLowerCase().includes(q) ||
    a.body.toLowerCase().includes(q)
  ));
};

/* ================= HELPERS ================= */
function getYT(url) {
  if (!url) return null;
  const m = url.match(/(?:youtu\.be\/|youtube.*v=|embed\/)([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : null;
}

function escapeHtml(str="") {
  return str
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;");
}

/* ================= INIT ================= */
loadArticles();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Le Journal</title>

<style>
/* ===== TON CSS INCHANGÉ (gardé tel quel) ===== */
body { font-family: Arial, sans-serif; }
</style>
</head>

<body>

<header>
  <h1>Le Journal</h1>
</header>

<input id="search-input" placeholder="Rechercher..." oninput="onSearch()"/>

<main>
  <div id="articles-list">Chargement...</div>
</main>

<aside>
  <ul id="index-list"></ul>
</aside>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  getFirestore, collection, addDoc, getDocs, deleteDoc,
  doc, updateDoc, query, orderBy, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const ADMIN_EMAIL = "aymaneabidine@gmail.com";

const firebaseConfig = {
  apiKey: "AIzaSyDs5vSuJ4XfYDhmUleWcOHaFEhikfp2G4M",
  authDomain: "publication-54ffa.firebaseapp.com",
  projectId: "publication-54ffa",
  storageBucket: "publication-54ffa.firebasestorage.app",
  messagingSenderId: "586923416251",
  appId: "1:586923416251:web:4fece200ce95341d8ba79e"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let allArticles = [];
let isAdmin = false;
let editingId = null;

/* ================= LOAD ================= */
async function loadArticles() {
  const listEl = document.getElementById("articles-list");
  listEl.innerHTML = "Chargement...";

  const snap = await getDocs(query(collection(db, "articles"), orderBy("createdAt", "desc")));

  allArticles = snap.docs.map(d => ({ id: d.id, ...d.data() }));

  renderArticles(allArticles);
  renderIndex(allArticles);
}

/* ================= RENDER ARTICLES ================= */
function renderArticles(list) {
  const listEl = document.getElementById("articles-list");
  listEl.innerHTML = "";

  if (!list.length) {
    listEl.innerHTML = "<p>Aucun article</p>";
    return;
  }

  list.forEach(a => {
    const date = a.createdAt
      ? new Date(a.createdAt.seconds * 1000).toLocaleDateString("fr-FR")
      : "";

    const card = document.createElement("div");

    card.innerHTML = `
      <h2>${esc(a.title)}</h2>
      <p>${esc(a.body)}</p>
      <small>${date}</small>
      <hr/>
    `;

    listEl.appendChild(card);
  });
}

/* ================= INDEX ================= */
function renderIndex(list) {
  const ul = document.getElementById("index-list");

  if (!list.length) {
    ul.innerHTML = "<li>Aucun article</li>";
    return;
  }

  ul.innerHTML = "";

  list.forEach((a, i) => {
    const li = document.createElement("li");

    const date = a.createdAt
      ? new Date(a.createdAt.seconds * 1000).toLocaleDateString("fr-FR")
      : "";

    li.innerHTML = `
      <strong>${i + 1}</strong> ${esc(a.title)} <br/>
      <small>${date}</small>
    `;

    ul.appendChild(li);
  });
}

/* ================= SEARCH ================= */
window.onSearch = () => {
  const q = document.getElementById("search-input").value.toLowerCase();

  const filtered = allArticles.filter(a =>
    a.title.toLowerCase().includes(q) ||
    a.body.toLowerCase().includes(q)
  );

  renderArticles(filtered);
  renderIndex(filtered);
};

/* ================= ESCAPE FIXÉ ================= */
function esc(s) {
  return (s || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;");
}

/* ================= AUTH ================= */
onAuthStateChanged(auth, user => {
  isAdmin = user && user.email === ADMIN_EMAIL;
  loadArticles();
});

/* first load */
loadArticles();

</script>

</body>
</html>
